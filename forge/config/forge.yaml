# Forge configuration. Plain YAML so you can see and change everything.
engine:
  backend: ollama
  model: qwen2.5:14b-instruct-q4_K_M   # upgraded from 7B -> 14B (your local ceiling)
  host: http://localhost:11434
  temperature: 0.2
  num_ctx: 8192
  vision_model: llama3.2-vision:11b    # best vision that fits 12GB (llava:7b fallback)
  # image gen: sd-turbo (fast, ~2GB, safe on busy VRAM). For higher quality swap to:
  #   stabilityai/sdxl-turbo  (better, ~7GB, needs ~8GB free VRAM)
  #   stabilityai/stable-diffusion-xl-base-1.0  (best, slow, 20+ steps)
  image_model: stabilityai/sd-turbo
  # Phase G escalation — when the local model fails a build step, hand THAT piece to a
  # bigger model. Uncomment + point at a rented vLLM box (or a bigger local model):
  # big_model: Qwen/Qwen2.5-72B-Instruct-AWQ
  # big_host: http://<rented-box>:8000
  # big_backend: openai

agent:
  max_steps: 8
  auto_approve_dangerous: false   # shell tool asks before running

bench:
  suites: [reasoning, coding]
  max_steps: 8
